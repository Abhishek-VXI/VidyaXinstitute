<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Vidyax Institute</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h2>VIDYAX INSTITUTE</h2>
</header>

<section class="hero">
<h1>Contact Us</h1>

</section>

<section class="features">

<div class="card">

<form>

<input type="text" placeholder="Your Name"><br><br>

<input type="email" placeholder="Email"><br><br>

<textarea placeholder="Your Message" rows="5" style="width:100%;padding:10px;"></textarea><br><br>

<button type="submit">Send Message</button>

</form>

</div>

</section>

</body>
</html>
